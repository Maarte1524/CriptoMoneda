symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - XRPUSDT
  - DOGEUSDT
  - ADAUSDT
  - LINKUSDT
  - TONUSDT
mode: paper
market_type: spot
base_timeframe: 15m
trend_timeframes: ["1h", "4h"]
poll_interval_sec: 20
strategy:
  active: combined_signal
  min_rr: 2.0
  atr_stop_multiple: 1.5
  trailing_start_r: 1.5
risk:
  risk_per_trade: 0.01
  max_open_positions: 4
  max_exposure_per_symbol: 0.25
  max_total_exposure: 0.8
  daily_drawdown_limit: -0.03
  weekly_drawdown_limit: -0.07
  consecutive_losses_for_cooldown: 3
  cooldown_hours: 24
execution:
  default_order_type: limit
  limit_timeout_sec: 60
  slippage_bps_limit: 10
  retry_attempts: 5
  retry_backoff_sec: 0.5
