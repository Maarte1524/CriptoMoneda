pairs:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - XRP/USDT
  - DOGE/USDT
  - ADA/USDT
  - LINK/USDT
  - TON/USDT
mode: paper
strategy: combined_signal
market_type: spot
use_testnet: true
timeframes:
  execution: 15m
  confirm: [1h, 4h]
risk:
  risk_per_trade: 0.01
  max_open_positions: 4
  max_exposure_per_asset: 0.25
  max_total_exposure: 0.85
  daily_drawdown_limit: -0.03
  weekly_drawdown_limit: -0.07
  cooldown_hours_after_3_losses: 24
  panic_equity_drop_pct: 0.10
execution:
  default_order_type: limit
  limit_order_timeout_seconds: 45
  max_slippage_bps: 8
  retry_attempts: 5
  retry_backoff_seconds: 1.5
alerts:
  telegram_enabled: true
  console_enabled: true
backtesting:
  fee_bps: 10
  slippage_bps: 6
  initial_capital: 10000
  min_trades_for_confidence: 200
