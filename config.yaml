mode: paper
market_type: spot
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - XRP/USDT
  - DOGE/USDT
  - ADA/USDT
  - LINK/USDT
  - TON/USDT
strategy: combined_signal
timeframe_execution: 15m
timeframe_confirm_1: 1h
timeframe_confirm_2: 4h
db_path: data/trading.db
log_dir: logs
risk:
  risk_per_trade: 0.01
  max_open_positions: 4
  max_exposure_per_pair: 0.25
  max_total_exposure: 0.8
  daily_drawdown_limit: -0.03
  weekly_drawdown_limit: -0.07
  consecutive_losses_for_cooldown: 3
  cooldown_hours: 24
  atr_stop_multiple: 1.5
  min_rr: 2.0
  trail_activation_r: 1.5
execution:
  limit_offset_bps: 3
  max_slippage_bps: 15
  order_timeout_seconds: 45
  max_retries: 5
  retry_backoff_base: 1.8
alerts:
  telegram_enabled: true
  console_enabled: true
backtest:
  fee_bps: 10
  slippage_bps: 5
  spread_bps: 2
  min_trades_threshold: 200
  train_ratio: 0.6
  validation_ratio: 0.2
